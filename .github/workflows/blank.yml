# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v5

      # Debugging step: checks node version. Should be v24 or up
      - name: Check Node Version
        run: node -v
        
      # Sets up python in running os
      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          cache: pip

      # Install dependencies
      - name: Install dependencies
        run: |
           python -m pip install --upgrade pip
           pip install -r requirements.txt
           
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

  # This workflow contains the integration testing for the server
  integration-test:
    # Host and Port are the same in every step
    runs-on: ubuntu-latest
    env:
      HOST: "127.0.0.1"
      PORT: "5000"

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v5

      # Sets up python in running os
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1: Start your custom TCP server in the background
      - name: Start TCP Server
        run: python src/server/server.py &

      # Step 2: Use an inline Python script to wait for the raw TCP socket to open
      - name: Wait for TCP Port
        run: |
          python -c "
          import socket, time, sys
          start = time.time()
          while time.time() - start < 15:
              try:
                  with socket.create_connection(('$HOST', $PORT), timeout=1):
                      print('Server is up and accepting raw TCP connections!')
                      sys.exit(0)
              except (OSError, ConnectionRefusedError):
                  time.sleep(0.5)
          print('Timeout: Server failed to start within 15 seconds')
          sys.exit(1)
          "

      # Step 3: Run your integration test suite (which acts as a mock client)
      - name: Run Integration Tests
        run: pytest ./tests/integration_test/test_server.py